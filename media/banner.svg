<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-label="Awesome Microsoft Copilot Connectors">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1929"/>
      <stop offset="100%" stop-color="#103a5a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#50e6ff"/>
      <stop offset="100%" stop-color="#0078d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="280" fill="url(#bg)"/>
  <g transform="translate(80, 70)">
    <rect x="0" y="0" width="60" height="60" fill="url(#accent)" opacity="0.95"/>
    <rect x="70" y="0" width="60" height="60" fill="url(#accent)" opacity="0.55"/>
    <rect x="0" y="70" width="60" height="60" fill="url(#accent)" opacity="0.55"/>
    <rect x="70" y="70" width="60" height="60" fill="url(#accent)" opacity="0.95"/>
    <line x1="130" y1="100" x2="180" y2="100" stroke="url(#accent)" stroke-width="3"/>
    <circle cx="180" cy="100" r="6" fill="url(#accent)"/>
  </g>
  <text x="320" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="700" fill="#f0f9ff">Awesome Microsoft</text>
  <text x="320" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="300" fill="url(#accent)">Copilot Connectors</text>
  <text x="320" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="400" fill="#9bc4e0" letter-spacing="2">A CURATED LIST OF MICROSOFT 365 COPILOT CONNECTORS</text>
</svg>
